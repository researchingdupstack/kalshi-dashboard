<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalshi Markets Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text2);
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  .refresh-btn:hover { background: var(--border); }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--surface2);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    display: none;
  }
  .progress-bar.active { display: block; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-card .sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* Main grid */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 40px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 16px;
  }

  /* Sidebar: category filter */
  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: sticky;
    top: 70px;
    max-height: calc(100vh - 90px);
    overflow-y: auto;
  }
  .sidebar h3 { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .cat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s;
    user-select: none;
  }
  .cat-item:hover { background: var(--surface2); }
  .cat-item.active { background: var(--accent); color: #000; font-weight: 600; }
  .cat-item.active .cat-count { color: rgba(0,0,0,0.6); }
  .cat-count { font-size: 12px; color: var(--text2); font-weight: 500; }

  /* Search */
  .search-bar {
    margin-bottom: 16px;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text2); }

  /* Events list */
  .events-panel {
    min-width: 0;
  }
  .events-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .events-header h2 { font-size: 16px; font-weight: 600; }
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }
  .event-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .event-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .event-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    flex: 1;
  }
  .event-category {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
    font-weight: 600;
  }
  .event-meta {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .event-meta span { display: flex; align-items: center; gap: 4px; }
  .event-ticker {
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 11px;
    color: var(--purple);
    background: rgba(188,140,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* Markets sub-list */
  .markets-list {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: none;
  }
  .event-card.expanded .markets-list { display: block; }
  .market-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 12px;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  .market-row:last-child { border-bottom: none; }
  .market-title { color: var(--text); }
  .market-yes { color: var(--green); font-weight: 600; font-family: monospace; }
  .market-no { color: var(--red); font-weight: 600; font-family: monospace; }
  .market-vol { color: var(--text2); font-family: monospace; font-size: 12px; }

  /* Category colors */
  .cat-sports { background: rgba(56,139,253,0.15); color: #58a6ff; }
  .cat-elections { background: rgba(188,140,255,0.15); color: #bc8cff; }
  .cat-politics { background: rgba(210,153,34,0.15); color: #d29922; }
  .cat-economics { background: rgba(63,185,80,0.15); color: #3fb950; }
  .cat-entertainment { background: rgba(248,81,73,0.15); color: #f85149; }
  .cat-crypto { background: rgba(255,166,87,0.15); color: #ffa657; }
  .cat-climate { background: rgba(57,211,183,0.15); color: #39d3b7; }
  .cat-science { background: rgba(121,192,255,0.15); color: #79c0ff; }
  .cat-companies { background: rgba(219,171,255,0.15); color: #dbabff; }
  .cat-financials { background: rgba(63,185,80,0.15); color: #56d364; }
  .cat-mentions { background: rgba(145,152,161,0.15); color: #9198a1; }
  .cat-world { background: rgba(255,123,114,0.15); color: #ff7b72; }
  .cat-social { background: rgba(238,159,237,0.15); color: #ee9fed; }
  .cat-health { background: rgba(63,185,80,0.15); color: #3fb950; }
  .cat-transportation { background: rgba(145,152,161,0.15); color: #9198a1; }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }
  .page-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .page-btn:hover { background: var(--surface2); }
  .page-btn:disabled { opacity: 0.4; cursor: default; }
  .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Chart */
  .chart-section {
    padding: 0 24px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .chart-card h3 { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { width: 160px; font-size: 13px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 24px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; }
  .bar-value { font-size: 12px; color: var(--text2); width: 50px; text-align: right; font-family: monospace; }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<div class="header">
  <h1>📊 <span>Kalshi</span> Markets Dashboard</h1>
  <div class="header-right">
    <span><span class="live-dot"></span> Live Data</span>
    <span id="lastUpdate">Loading...</span>
    <button class="refresh-btn" onclick="forceRefresh()">↻ Refresh</button>
  </div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="label">Total Events</div><div class="value" id="statEvents">—</div><div class="sub">Open events</div></div>
  <div class="stat-card"><div class="label">Categories</div><div class="value" id="statCats">—</div><div class="sub">Market categories</div></div>
  <div class="stat-card"><div class="label">Largest Category</div><div class="value" id="statLargest">—</div><div class="sub" id="statLargestSub"></div></div>
  <div class="stat-card"><div class="label">Ticker Format</div><div class="value" style="font-size:16px;font-family:monospace;color:var(--purple)">Proprietary</div><div class="sub">KX-prefixed, no BBG/Reuters</div></div>
</div>

<div class="chart-section">
  <div class="chart-card">
    <h3>EVENTS BY CATEGORY</h3>
    <div class="bar-chart" id="barChart"></div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <h3>Categories</h3>
    <div id="catList"></div>
  </div>

  <div class="events-panel">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search events by title or ticker..." />
    </div>
    <div class="events-header">
      <h2 id="eventsTitle">All Events</h2>
      <select class="sort-select" id="sortSelect">
        <option value="title">Sort: Title A-Z</option>
        <option value="ticker">Sort: Ticker</option>
        <option value="category">Sort: Category</option>
      </select>
    </div>
    <div id="eventsList">
      <div class="loading"><div class="spinner"></div>Loading events from Kalshi API...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
const API = 'https://api.elections.kalshi.com/trade-api/v2';
const PAGE_SIZE = 30;

let allEvents = [];
let filteredEvents = [];
let currentCategory = null;
let currentPage = 1;
let marketsCache = {};

const catClassMap = {
  'Sports': 'cat-sports', 'Elections': 'cat-elections', 'Politics': 'cat-politics',
  'Economics': 'cat-economics', 'Entertainment': 'cat-entertainment', 'Crypto': 'cat-crypto',
  'Climate and Weather': 'cat-climate', 'Science and Technology': 'cat-science',
  'Companies': 'cat-companies', 'Financials': 'cat-financials', 'Mentions': 'cat-mentions',
  'World': 'cat-world', 'Social': 'cat-social', 'Health': 'cat-health',
  'Transportation': 'cat-transportation'
};

const barColors = [
  '#58a6ff','#bc8cff','#d29922','#3fb950','#f85149','#ffa657',
  '#39d3b7','#79c0ff','#dbabff','#56d364','#9198a1','#ff7b72',
  '#ee9fed','#3fb950','#9198a1'
];

async function apiFetch(path, params = {}) {
  const url = new URL(API + path);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));

  // Try direct first, fall back to CORS proxies if blocked
  const proxies = [
    '',  // direct
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
  ];

  for (const proxy of proxies) {
    try {
      const fetchUrl = proxy ? proxy + encodeURIComponent(url.toString()) : url.toString();
      const resp = await fetch(fetchUrl);
      if (!resp.ok) continue;
      return resp.json();
    } catch (e) {
      if (proxy === proxies[proxies.length - 1]) throw e;
      continue;
    }
  }
  throw new Error('All API fetch attempts failed');
}

function getCatCounts(events) {
  const counts = {};
  events.forEach(e => {
    const cat = e.category || 'Other';
    counts[cat] = (counts[cat] || 0) + 1;
  });
  return Object.entries(counts).sort((a,b) => b[1] - a[1]);
}

function renderStats(events) {
  const cats = getCatCounts(events);
  document.getElementById('statEvents').textContent = events.length.toLocaleString();
  document.getElementById('statCats').textContent = cats.length;
  if (cats.length) {
    document.getElementById('statLargest').textContent = cats[0][0];
    document.getElementById('statLargestSub').textContent = cats[0][1].toLocaleString() + ' events';
  }
  document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

function renderBarChart(events) {
  const cats = getCatCounts(events);
  const maxVal = cats[0]?.[1] || 1;
  const container = document.getElementById('barChart');
  container.innerHTML = cats.map(([cat, count], i) => `
    <div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width: ${(count/maxVal*100).toFixed(1)}%; background: ${barColors[i % barColors.length]};">
          ${count > maxVal * 0.15 ? count.toLocaleString() : ''}
        </div>
      </div>
      <div class="bar-value">${count.toLocaleString()}</div>
    </div>
  `).join('');
}

function renderCategories(events) {
  const cats = getCatCounts(events);
  const total = events.length;
  const container = document.getElementById('catList');
  const allItem = `<div class="cat-item ${!currentCategory ? 'active' : ''}" onclick="selectCategory(null)">
    <span>All</span><span class="cat-count">${total.toLocaleString()}</span>
  </div>`;
  container.innerHTML = allItem + cats.map(([cat, count]) => `
    <div class="cat-item ${currentCategory === cat ? 'active' : ''}" onclick="selectCategory('${cat.replace(/'/g, "\\'")}')">
      <span>${cat}</span><span class="cat-count">${count.toLocaleString()}</span>
    </div>
  `).join('');
}

function selectCategory(cat) {
  currentCategory = cat;
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredEvents = allEvents.filter(e => {
    if (currentCategory && e.category !== currentCategory) return false;
    if (query) {
      const title = (e.title || '').toLowerCase();
      const ticker = (e.event_ticker || '').toLowerCase();
      if (!title.includes(query) && !ticker.includes(query)) return false;
    }
    return true;
  });

  const sort = document.getElementById('sortSelect').value;
  filteredEvents.sort((a, b) => {
    if (sort === 'title') return (a.title || '').localeCompare(b.title || '');
    if (sort === 'ticker') return (a.event_ticker || '').localeCompare(b.event_ticker || '');
    if (sort === 'category') return (a.category || '').localeCompare(b.category || '');
    return 0;
  });

  renderCategories(allEvents);
  renderEventsList();
  renderPagination();

  const title = currentCategory || 'All';
  document.getElementById('eventsTitle').textContent = `${title} Events (${filteredEvents.length.toLocaleString()})`;
}

function renderEventsList() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredEvents.slice(start, start + PAGE_SIZE);
  const container = document.getElementById('eventsList');

  if (!page.length) {
    container.innerHTML = '<div class="loading">No events found</div>';
    return;
  }

  container.innerHTML = page.map(e => {
    const catClass = catClassMap[e.category] || 'cat-sports';
    const ticker = e.event_ticker || '';
    const title = e.title || ticker;
    const mutually_exclusive = e.mutually_exclusive ? '⚖️ Exclusive' : '';
    const series = e.series_ticker || '';
    const sub = e.sub_title || '';

    return `
      <div class="event-card" id="evt-${ticker}" onclick="toggleEvent('${ticker}')">
        <div class="event-top">
          <div class="event-title">${escHtml(title)}</div>
          <div class="event-category ${catClass}">${e.category || 'Other'}</div>
        </div>
        ${sub ? `<div style="font-size:13px;color:var(--text2);margin-top:4px">${escHtml(sub)}</div>` : ''}
        <div class="event-meta">
          <span class="event-ticker">${ticker}</span>
          ${series ? `<span>Series: ${series}</span>` : ''}
          ${mutually_exclusive ? `<span>${mutually_exclusive}</span>` : ''}
          ${e.strike_type ? `<span>Type: ${e.strike_type}</span>` : ''}
        </div>
        <div class="markets-list" id="markets-${ticker}">
          <div class="loading" style="padding:16px"><div class="spinner"></div>Loading markets...</div>
        </div>
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function toggleEvent(ticker) {
  const card = document.getElementById('evt-' + ticker);
  const isExpanded = card.classList.contains('expanded');

  // collapse all
  document.querySelectorAll('.event-card.expanded').forEach(c => c.classList.remove('expanded'));

  if (isExpanded) return;

  card.classList.add('expanded');
  const container = document.getElementById('markets-' + ticker);

  if (marketsCache[ticker]) {
    renderMarkets(ticker, marketsCache[ticker]);
    return;
  }

  try {
    const data = await apiFetch('/markets', { event_ticker: ticker, limit: 100 });
    const markets = data.markets || [];
    marketsCache[ticker] = markets;
    renderMarkets(ticker, markets);
  } catch (err) {
    container.innerHTML = `<div style="color:var(--red);padding:8px">Error loading markets: ${err.message}</div>`;
  }
}

function renderMarkets(ticker, markets) {
  const container = document.getElementById('markets-' + ticker);
  if (!markets.length) {
    container.innerHTML = '<div style="padding:8px;color:var(--text2)">No individual markets found</div>';
    return;
  }

  const header = `<div class="market-row" style="font-size:11px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);">
    <div>Market</div><div>Yes Bid</div><div>No Bid</div><div>Volume</div>
  </div>`;

  container.innerHTML = header + markets.slice(0, 50).map(m => {
    const title = m.title || m.ticker;
    const yes = m.yes_bid_dollars != null ? `$${Number(m.yes_bid_dollars).toFixed(2)}` : '—';
    const no = m.no_bid_dollars != null ? `$${Number(m.no_bid_dollars).toFixed(2)}` : '—';
    const vol = m.volume_fp != null ? Number(m.volume_fp).toLocaleString() : '—';
    return `<div class="market-row">
      <div class="market-title">${escHtml(title)}<br><span class="event-ticker" style="font-size:10px">${m.ticker}</span></div>
      <div class="market-yes">${yes}</div>
      <div class="market-no">${no}</div>
      <div class="market-vol">${vol}</div>
    </div>`;
  }).join('') + (markets.length > 50 ? `<div style="padding:8px;color:var(--text2);font-size:12px">+ ${markets.length - 50} more markets</div>` : '');
}

function renderPagination() {
  const totalPages = Math.ceil(filteredEvents.length / PAGE_SIZE);
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }

  let btns = [];
  btns.push(`<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">← Prev</button>`);

  const range = 3;
  let start = Math.max(1, currentPage - range);
  let end = Math.min(totalPages, currentPage + range);

  if (start > 1) btns.push(`<button class="page-btn" onclick="goPage(1)">1</button>`);
  if (start > 2) btns.push(`<span style="color:var(--text2);padding:8px">…</span>`);

  for (let i = start; i <= end; i++) {
    btns.push(`<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`);
  }

  if (end < totalPages - 1) btns.push(`<span style="color:var(--text2);padding:8px">…</span>`);
  if (end < totalPages) btns.push(`<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`);

  btns.push(`<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next →</button>`);

  container.innerHTML = btns.join('');
}

function goPage(p) {
  currentPage = p;
  renderEventsList();
  renderPagination();
  window.scrollTo({ top: document.querySelector('.main').offsetTop - 80, behavior: 'smooth' });
}

const CACHE_KEY = 'kalshi_events_cache';
const CACHE_TTL = 5 * 60 * 1000; // 5 minutes

function getCachedEvents() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const cached = JSON.parse(raw);
    if (Date.now() - cached.ts > CACHE_TTL) return null;
    return cached.events;
  } catch { return null; }
}

function setCachedEvents(events) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), events }));
  } catch {}
}

async function loadData() {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');

  // Try cache first for instant load
  const cached = getCachedEvents();
  if (cached && cached.length > 0) {
    allEvents = cached;
    renderStats(allEvents);
    renderBarChart(allEvents);
    applyFilters();
    document.getElementById('lastUpdate').textContent = 'From cache — click Refresh for live data';
    return;
  }

  document.getElementById('eventsList').innerHTML = '<div class="loading"><div class="spinner"></div>Fetching events from Kalshi API...</div>';
  bar.classList.add('active');
  fill.style.width = '5%';
  try {
    const first = await apiFetch('/events', { limit: 200, status: 'open' });
    allEvents = first.events || [];
    fill.style.width = '10%';
    renderStats(allEvents);
    renderBarChart(allEvents);
    applyFilters();

    let cursor = first.cursor;
    if (cursor && allEvents.length) {
      streamRemaining(cursor);
    } else {
      fill.style.width = '100%';
      setCachedEvents(allEvents);
      setTimeout(() => bar.classList.remove('active'), 500);
    }
  } catch (err) {
    bar.classList.remove('active');
    document.getElementById('eventsList').innerHTML = `<div class="loading" style="color:var(--red)">Error: ${err.message}<br><br><button class="refresh-btn" onclick="forceRefresh()">Retry</button></div>`;
  }
}

function forceRefresh() {
  try { localStorage.removeItem(CACHE_KEY); } catch {}
  allEvents = [];
  loadData();
}

async function streamRemaining(cursor) {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const estimatedTotal = 4700;
  let batch = 0;
  while (cursor) {
    try {
      const data = await apiFetch('/events', { limit: 200, status: 'open', cursor });
      const events = data.events || [];
      if (!events.length) break;
      allEvents = allEvents.concat(events);
      cursor = data.cursor;
      batch++;
      const pct = Math.min(95, 10 + (allEvents.length / estimatedTotal) * 85);
      fill.style.width = pct.toFixed(0) + '%';
      if (batch % 5 === 0 || !cursor) {
        renderStats(allEvents);
        renderBarChart(allEvents);
        applyFilters();
      } else {
        document.getElementById('statEvents').textContent = allEvents.length.toLocaleString() + '...';
      }
      if (!cursor) break;
    } catch (err) {
      console.error('Background fetch error:', err);
      break;
    }
  }
  fill.style.width = '100%';
  renderStats(allEvents);
  renderBarChart(allEvents);
  applyFilters();
  setCachedEvents(allEvents);
  setTimeout(() => bar.classList.remove('active'), 500);
}

// Wire up search + sort
document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; applyFilters(); });
document.getElementById('sortSelect').addEventListener('change', () => applyFilters());

// Boot
loadData();
</script>
